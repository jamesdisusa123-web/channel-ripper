name: 🚀 Auto Build EXE

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install Python deps
      run: |
        pip install customtkinter yt-dlp pyinstaller
        
    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --clean --name "ChannelRipper" ^
        --add-data "channel_ripper.py;." channel_ripper.py
        
    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: ChannelRipper-Windows
        path: dist/ChannelRipper.exe
        
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: dist/ChannelRipper.exe
        generate_release_notes: true
